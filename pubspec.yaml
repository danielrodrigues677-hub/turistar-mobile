name: turistar_mobile
description: App Flutter limpo da Turistar para busca e reserva de viagens.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  cloud_firestore: ^5.6.9
  crypto: ^3.0.6
  firebase_auth: ^5.5.4
  firebase_core: ^3.13.1
  http: ^1.6.0
  shared_preferences: ^2.5.3
  url_launcher: ^6.3.0

dev_dependencies:
  fake_cloud_firestore: ^3.1.0
  flutter_test:
    sdk: flutter
  firebase_core_platform_interface: ^6.0.3
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/packages/
